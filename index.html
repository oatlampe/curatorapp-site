<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Curator — Legal</title>
  <style>
    :root {
      --bg: #111;
      --text: #e0dcd4;
      --text-muted: #9a9590;
      --accent: #c9a84c;
      --border: #2a2724;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    h1 {
      font-size: 2rem;
      color: var(--accent);
      margin-bottom: 0.5rem;
      letter-spacing: 0.03em;
    }
    .subtitle {
      color: var(--text-muted);
      margin-bottom: 2.5rem;
      font-size: 0.95rem;
    }
    .links {
      display: flex;
      gap: 2rem;
    }
    a {
      color: var(--accent);
      text-decoration: none;
      font-size: 1.1rem;
      padding: 0.6rem 1.5rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      transition: border-color 0.2s;
    }
    a:hover {
      border-color: var(--accent);
    }
  </style>
</head>
<body>
  <h1>Curator</h1>
  <p class="subtitle">Photo Manager</p>
  <div class="links">
    <a href="privacy.html">Privacy Policy</a>
    <a href="terms.html">Terms of Use</a>
  </div>
</body>
</html>
